<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store with Quantity</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    margin:20px;
}

h1, h2{
    text-align:center;
}

.form, .checkout{
    width:320px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    padding:8px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:darkgreen;
}

#products, #cart{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:220px;
    background:white;
    border-radius:10px;
    padding:10px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.card img{
    width:200px;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

.price{
    color:green;
    font-weight:bold;
}

.qty-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:5px;
}

.total-box{
    text-align:center;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>🛍️ Store with Quantity</h1>

<div class="form">

<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price ₹">
<input type="file" id="image" accept="image/*">

<button onclick="addProduct()">Add Product</button>

</div>

<h2>Products</h2>
<div id="products"></div>

<h2>🛒 Cart</h2>
<div id="cart"></div>

<div class="total-box">
Total: ₹<span id="total">0</span>
</div>

<h2>📦 Checkout</h2>

<div class="checkout">

<input type="text" id="cname" placeholder="Name">
<input type="text" id="cphone" placeholder="Phone">
<textarea id="caddress" placeholder="Address"></textarea>

<button onclick="checkout()">Send WhatsApp Order</button>

</div>

<script>

let products = [];
let cart = [];
let total = 0;

// ADD PRODUCT
function addProduct(){

    let name = document.getElementById("name").value;
    let price = Number(document.getElementById("price").value);
    let file = document.getElementById("image").files[0];

    if(!name || !price || !file){
        alert("Fill all fields");
        return;
    }

    let imgURL = URL.createObjectURL(file);

    products.push({name, price, imgURL});

    renderProducts();

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";
}

// SHOW PRODUCTS
function renderProducts(){

    let container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach((p, index)=>{

        container.innerHTML += `
        <div class="card">
            <img src="${p.imgURL}">
            <h3>${p.name}</h3>
            <p class="price">₹${p.price}</p>
            <button onclick="addToCart(${index})">Add to Cart</button>
        </div>
        `;
    });
}

// ADD TO CART WITH QUANTITY
function addToCart(index){

    let item = products[index];

    let found = cart.find(p => p.name === item.name);

    if(found){
        found.qty += 1;
    } else {
        cart.push({...item, qty:1});
    }

    renderCart();
}

// RENDER CART
function renderCart(){

    let container = document.getElementById("cart");
    container.innerHTML = "";
    total = 0;

    cart.forEach((item, index)=>{

        total += item.price * item.qty;

        container.innerHTML += `
        <div class="card">
            <img src="${item.imgURL}">
            <h3>${item.name}</h3>
            <p class="price">₹${item.price}</p>

            <div class="qty-box">
                <button onclick="decreaseQty(${index})">-</button>
                <span>${item.qty}</span>
                <button onclick="increaseQty(${index})">+</button>
            </div>
        </div>
        `;
    });

    document.getElementById("total").innerText = total;
}

// INCREASE QTY
function increaseQty(index){
    cart[index].qty++;
    renderCart();
}

// DECREASE QTY
function decreaseQty(index){

    cart[index].qty--;

    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }

    renderCart();
}

// CHECKOUT
function checkout(){

    let name = document.getElementById("cname").value;
    let phone = document.getElementById("cphone").value;
    let address = document.getElementById("caddress").value;

    if(!name || !phone || !address){
        alert("Fill checkout details");
        return;
    }

    let msg = `🛍️ ORDER%0A%0A`;
    msg += `Name: ${name}%0APhone: ${phone}%0AAddress: ${address}%0A%0AItems:%0A`;

    cart.forEach(i=>{
        msg += `- ${i.name} x${i.qty} = ₹${i.price * i.qty}%0A`;
    });

    msg += `%0ATotal: ₹${total}`;

    window.open(`https://wa.me/918011363245?text=${msg}`, "_blank");
}

</script>

</body>
  </html>
